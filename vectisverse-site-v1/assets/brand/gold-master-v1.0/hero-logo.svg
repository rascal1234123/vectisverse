<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 360" role="img" aria-labelledby="title desc">
<title id="title">VectisVerse</title><desc id="desc">VectisVerse master hero logo with silver lettering, central V and blue island diamond.</desc>
<defs>
 <linearGradient id="silver" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset=".22" stop-color="#bfc7cf"/><stop offset=".48" stop-color="#f4f6f8"/><stop offset=".72" stop-color="#727c87"/><stop offset="1" stop-color="#242c34"/></linearGradient>
 <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#36dcff"/><stop offset=".48" stop-color="#087dff"/><stop offset="1" stop-color="#0632c8"/></linearGradient>
 <filter id="shadow" x="-20%" y="-30%" width="140%" height="180%"><feGaussianBlur in="SourceAlpha" stdDeviation="4" result="b"/><feOffset dy="6" result="o"/><feColorMatrix in="o" values="0 0 0 0 0.02 0 0 0 0 0.04 0 0 0 0 0.07 0 0 0 .9 0"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
 <filter id="glow" x="-80%" y="-100%" width="260%" height="300%"><feGaussianBlur stdDeviation="12" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<g filter="url(#shadow)">
 <text x="42" y="232" fill="url(#silver)" stroke="#151c23" stroke-width="3" font-family="Rajdhani, Exo 2, Arial, sans-serif" font-size="220" font-weight="700" letter-spacing="-7">VECTIS</text>
 <g transform="translate(710 32)">
   <path d="M10 6 L104 6 L160 215 L216 6 L310 6 L212 302 L108 302 Z" fill="url(#silver)" stroke="#151c23" stroke-width="7"/>
   <path d="M160 94 L258 154 L160 214 L62 154 Z" fill="url(#blue)" stroke="#24c9ff" stroke-width="4" filter="url(#glow)"/>
   <path d="M86 154 L160 109 L234 154 L160 199 Z" fill="none" stroke="#a9efff" stroke-opacity=".6" stroke-width="3"/>
 </g>
 <text x="1010" y="232" fill="url(#silver)" stroke="#151c23" stroke-width="3" font-family="Rajdhani, Exo 2, Arial, sans-serif" font-size="220" font-weight="700" letter-spacing="-7">ERSE</text>
</g>
<text x="750" y="338" text-anchor="middle" fill="#dce8ef" font-family="Exo 2, Arial, sans-serif" font-size="33" font-weight="600" letter-spacing="16">ONE ISLAND. <tspan fill="#22c9ff">ENDLESS</tspan> STORIES.</text>
</svg>